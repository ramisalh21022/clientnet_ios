name: Build Flutter iOS (No Signing)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1️⃣ سحب الكود من GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ تثبيت Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'  # يجب أن يكون >= Dart 3.9.2

      # 3️⃣ تحقق من Flutter & Dart
      - name: Flutter version
        run: flutter --version

      # 4️⃣ تنزيل الـ iOS artifacts الضرورية
      - name: Flutter precache iOS
        run: flutter precache --ios

      # 5️⃣ تثبيت dependencies
      - name: Flutter pub get
        run: flutter pub get

      # 6️⃣ Build إعدادات iOS فقط (تجنب Code Signing)
      - name: Prepare iOS build (config-only)
        run: flutter build ios --release --no-codesign --config-only

      # 7️⃣ Build باستخدام xcodebuild بدون توقيع
      - name: Build Runner.app without code signing
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
          -scheme Runner \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          build

      # 8️⃣ رفع artifact الناتج
      - name: Upload Runner.app
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/Release-iphoneos/Runner.app
