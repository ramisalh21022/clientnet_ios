name: Flutter iOS Build (No Signing)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Install Flutter manually (Dart 3.9+)
      - name: Install Flutter manually
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1
          export PATH="$PWD/flutter/bin:$PATH"
          flutter --version

      # 3️⃣ Get dependencies
      - name: Flutter pub get
        run: flutter pub get

      # 4️⃣ Install CocoaPods
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # 5️⃣ Build iOS without code signing
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # 6️⃣ Prepare artifact
      - name: Prepare artifact
        run: |
          mkdir output
          cp -R build/ios/iphoneos/Runner.app output/

      # 7️⃣ Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: output/
