name: Build iOS App for Windows Users

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1️⃣ سحب الكود
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ تثبيت Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      # 3️⃣ تثبيت Dependencies
      - name: Get Flutter packages
        run: flutter pub get

      # 4️⃣ تثبيت CocoaPods
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios
          pod install
          cd ..

      # 5️⃣ بناء التطبيق بدون توقيع
      - name: Build iOS (no code signing)
        run: flutter build ios --release --no-codesign

      # 6️⃣ إنشاء مجلد Output وتجميع التطبيق
      - name: Archive Runner.app
        run: |
          mkdir -p output
          cp -R build/ios/iphoneos/Runner.app output/

      # 7️⃣ رفع Artifact ليتم تحميله
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: output/
