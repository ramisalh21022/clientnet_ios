name: Flutter iOS Build (No Signing)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # 1️⃣ تثبيت Flutter
      - name: Install Flutter manually
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      # 2️⃣ تحقق من نسخة Flutter
      - run: flutter --version

      # 3️⃣ تنزيل ملفات iOS اللازمة
      - name: Flutter precache iOS
        run: flutter precache --ios

      # 4️⃣ تثبيت dependencies
      - run: flutter pub get

      # 5️⃣ تثبيت CocoaPods
      - run: |
          cd ios
          pod install --repo-update
          cd ..

      # 6️⃣ Build إعدادات iOS فقط (تجنب Code Signing)
      - name: Prepare iOS build (config-only)
        run: flutter build ios --simulator

      # 7️⃣ Build باستخدام xcodebuild بدون توقيع
      - name: Build Runner.app without code signing
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
          -scheme Runner \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          build

      # 8️⃣ رفع artifact الناتج
      - name: Upload Runner.app
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphonesimulator/Runner.app
