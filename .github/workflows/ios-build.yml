name: Flutter iOS Build (No Signing)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1️⃣ سحب المشروع
      - uses: actions/checkout@v4

      # 2️⃣ تثبيت Flutter (دعم Dart >=3.9.2)
      - name: Install Flutter manually
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      # 3️⃣ تحقق من Flutter & Dart
      - run: flutter --version

      # 4️⃣ تنزيل ملفات iOS الضرورية
      - name: Flutter precache iOS
        run: flutter precache --ios

      # 5️⃣ تثبيت dependencies
      - run: flutter pub get

      # 6️⃣ تثبيت CocoaPods
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # 7️⃣ Build iOS بدون Code Signing (device) - التحذير طبيعي
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # 8️⃣ تجهيز Artifact
      - name: Prepare artifact
        run: |
          mkdir output
          cp -R build/ios/iphoneos/Runner.app output/

      # 9️⃣ رفع Artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: output/
